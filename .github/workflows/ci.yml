name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@49933ea52886caeca8642d1b84af00acd30e6e99 # v4
        with:
          node-version: "22"

      - name: Build Cursor SDK bridge
        run: npm ci && npm run build
        working-directory: scripts/cursor-agent

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/kilroy/

      - name: Test
        run: go test ./...

      - name: Validate graphs
        run: |
          for f in demo/**/*.dot; do
            echo "Validating $f"
            ./kilroy attractor validate --graph "$f"
          done
