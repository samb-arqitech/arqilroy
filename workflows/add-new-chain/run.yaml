version: 1

graph: workflows/add-new-chain/graph.dot
task: "Add a new blockchain network to atomic-swap-app via Cursor Composer 2.5 Fast (max mode)"

repo:
  path: /root/workspace/arqitech/atomic-swap-app

cxdb:
  binary_addr: 127.0.0.1:9009
  http_base_url: http://127.0.0.1:9010
  autostart:
    enabled: false

llm:
  cli_profile: real
  providers:
    cursor:
      backend: cli

modeldb:
  openrouter_model_info_path: /root/workspace/arqitech/arqilroy/internal/attractor/modeldb/pinned/openrouter_models.json
  openrouter_model_info_update_policy: on_run_start
  openrouter_model_info_url: https://openrouter.ai/api/v1/models
  openrouter_model_info_fetch_timeout_ms: 5000

git:
  require_clean: false
  base_ref: feat/dev-2986-remove-reversed-direction
  run_branch_prefix: feat
  commit_per_node: true

inputs:
  materialize:
    enabled: true
    follow_references: false
    imports:
      - pattern: "docs/architecture/**/*.md"
        required: false
      - pattern: "shared/src/**/*.ts"
        required: false
    infer_with_llm: false

artifact_policy:
  profiles: ["node", "generic"]
  env:
    managed_roots:
      tool_cache_root: "managed"
    overrides:
      generic:
        CURSOR_API_KEY: ""
        KILROY_CURSOR_MAX_MODE: "true"
        KILROY_CURSOR_AGENT_PATH: "/root/workspace/arqitech/arqilroy/scripts/kilroy-cursor-agent"
      node:
        BUN_INSTALL_CACHE_DIR: "{managed_roots.tool_cache_root}/bun-cache"
  checkpoint:
    exclude_globs:
      - "**/node_modules/**"
      - "**/.bun/**"
      - "**/dist/**"
      - "**/coverage/**"

runtime_policy:
  stage_timeout_ms: 0
  stall_timeout_ms: 900000
  stall_check_interval_ms: 5000
  max_llm_retries: 6

preflight:
  prompt_probes:
    enabled: true
    transports: [complete]
    timeout_ms: 60000
    retries: 1
    base_delay_ms: 500
    max_delay_ms: 5000
